name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run MenuMateCore unit tests
        run: swift test
        working-directory: Core

      - name: Generate project (project.yml)
        run: |
          brew install xcodegen
          cp Local.xcconfig.template Local.xcconfig
          xcodegen generate

      # Core tests alone don't catch App/FinderExtension compile breaks (the App
      # target has no tests). Compile both here so a broken App can't reach main.
      - name: Build app + extension (compile check)
        run: |
          xcodebuild build \
            -project MenuMate.xcodeproj \
            -scheme MenuMate \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            -quiet
